    <header class="bg-dark text-white text-center p-3">
        <h1>İletişim Bilgileri</h1>
    </header>

    <main id="app" class="container my-5">
        <section class="row justify-content-center">
            <div class="col-md-6">
                <article class="card p-4 shadow">
                    <h2 class="text-center mb-4">İletişim Formu</h2>

                    <form action="../PHP/iletisim.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Ad Soyad</label>
                            <input type="text" class="form-control" id="name" name="name" required v-model="name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required v-model="email">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Telefon</label>
                            <input type="text" class="form-control" id="phone" name="phone" required v-model="phone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cinsiyet</label><br>
                            <input type="radio" name="gender" value="Erkek" checked> Erkek
                            <input type="radio" name="gender" value="Kadın"> Kadın
                        </div>
                        <div class="mb-3">
                            <label class="form-label">İlgi Alanları</label>
                            <input type="checkbox" name="interest[]" value="Yazılım"> Yazılım
                            <input type="checkbox" name="interest[]" value="Müzik"> Müzik
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Şehir</label>
                            <select name="city" id="city" class="form-select">
                                <option value="">Seçiniz</option>
                                <option value="Sakarya">Sakarya</option>
                                <option value="İstanbul">İstanbul</option>
                                <option value="Ankara">Ankara</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mesaj</label>
                            <textarea name="message" id="message" class="form-control" required v-model="message"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-warning" onclick="validateJS()">JS Kontrol</button>
                            <button type="button" class="btn btn-info" @click="validateVue()">Vue Kontrol</button>
                            <button type="submit" class="btn btn-success">Gönder</button>
                        </div>
                    </form>

                    <p id="error" class="mt-3 text-danger"></p>
                </article>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white text-center py-3">
