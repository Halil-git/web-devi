<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css" integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../CSS/login.css">
    <title>Login</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a href="Giris.html" class="navbar-brand">Kişisel Web Sitem</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="CV.html" class="nav-link">CV</a></li>
                    <li class="nav-item"><a href="Sehir.html" class="nav-link">Şehrim</a></li>
                    <li class="nav-item"><a href="Kulturel_Miras.html" class="nav-link">Kültürel Miraslar</a></li>
                    <li class="nav-item"><a href="Ilgi_Alani.html" class="nav-link">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a href="Iletisim.html" class="nav-link">İletişim</a></li>
                    <li class="nav-item"><a href="Login.html" class="nav-link">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="bg-dark text-white text-center p-3">
        <h1>Giriş Sistemi</h1>
    </header>

    <main class="container d-flex justify-content-center align-items-center">
        <section id="app" class="login-box">
            <h2 class="text-center mb-4">Giriş Yap</h2>

            <form action="../PHP/login.php" id="loginForm" method="POST">
                <article class="mb-3">
                    <label>Email</label>
                    <input type="text" id="email" name="email" class="form-control" v-model="email">
                </article>

                <article class="mb-3">
                    <label>Şifre</label>
                    <input type="password" id="password" name="password" class="form-control" v-model="password">
                </article>

                <button type="submit" class="btn btn-primary w-100 mb-2">
                    Giriş Yap (JS)
                </button>

                <button type="button" class="btn btn-success w-100" @click="vueValidate">
                    Vue ile Kontrol Et
                </button>
            </form>
            <p id="error" class="text-danger mt-3 text-center">{{ error }}</p>
        </section>
    </main>

    <footer class="bg-dark text-white text-center p-2 mt-5">
        <small>© 2026 Web Teknolojileri</small>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js" integrity="sha512-HvOjJrdwNpDbkGJIG2ZNqDlVqMo77qbs4Me4cah0HoDrfhrbA+8SBlZn1KrvAQw7cILLPFJvdwIgphzQmMm+Pw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="../JS/login.js"></script>
</body>
</html>
